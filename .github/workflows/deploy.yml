name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -euo pipefail
            echo "=== AgentCore Auto-Deploy $(date '+%Y-%m-%d %H:%M:%S') ==="

            # Detect repo path (must have .git directory)
            REPO_PATH=""
            for p in /opt/agentcore-v3 /opt/agentcore /root/agentcore /home/agentcore/agentcore; do
              if [ -d "$p/.git" ]; then REPO_PATH="$p"; break; fi
            done
            if [ -z "$REPO_PATH" ]; then
              echo "ERROR: git repo not found in any of:"
              echo "  /opt/agentcore-v3, /opt/agentcore, /root/agentcore, /home/agentcore/agentcore"
              exit 1
            fi
            echo "Repo path: $REPO_PATH"

            # 1. Git pull FIRST (so app path detection sees fresh structure)
            echo ""
            echo "=== [1/6] Git pull ==="
            cd "$REPO_PATH"
            git fetch --all --prune
            git reset --hard origin/main
            git clean -fd -e node_modules -e .next -e .env
            git log -1 --oneline

            # Detect app subdir AFTER pull (repo has agentcore-v3/ subdir, or apps/ at root)
            if [ -d "$REPO_PATH/agentcore-v3/apps/api" ]; then
              APP_PATH="$REPO_PATH/agentcore-v3"
            elif [ -d "$REPO_PATH/apps/api" ]; then
              APP_PATH="$REPO_PATH"
            else
              echo "ERROR: apps/api not found under $REPO_PATH"
              echo "Contents of $REPO_PATH:"
              ls -la "$REPO_PATH" || true
              exit 1
            fi
            echo "App path:  $APP_PATH"

            # 2. Install API deps
            echo ""
            echo "=== [2/6] Install API deps ==="
            cd "$APP_PATH/apps/api"
            npm install --production 2>&1 | tail -3

            # 3. Prisma
            echo ""
            echo "=== [3/6] Prisma generate + db push ==="
            cd "$APP_PATH/packages/prisma"
            npx prisma generate 2>&1 | tail -3
            npx prisma db push --accept-data-loss 2>&1 | tail -5

            # 4. Install Web deps
            echo ""
            echo "=== [4/6] Install Web deps ==="
            cd "$APP_PATH/apps/web"
            npm install 2>&1 | tail -3

            # 5. Build Web
            echo ""
            echo "=== [5/6] Build Web ==="
            npx next build 2>&1 | tail -15

            # 6. Restart PM2
            echo ""
            echo "=== [6/6] Restart PM2 ==="
            cd "$APP_PATH"
            # Reload if already managed by PM2, otherwise start fresh
            if pm2 describe agentcore-api >/dev/null 2>&1 && pm2 describe agentcore-web >/dev/null 2>&1; then
              echo "PM2 processes found, reloading..."
              pm2 reload ecosystem.config.js --env production
            else
              echo "PM2 processes not found, starting fresh..."
              pkill -f "node server.js" 2>/dev/null || true
              pkill -f "next-server" 2>/dev/null || true
              pkill -f "next start" 2>/dev/null || true
              sleep 1
              pm2 start ecosystem.config.js --env production
              pm2 save
            fi
            sleep 4
            pm2 status

            # Health check
            echo ""
            echo "=== Health check ==="
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/api/health || echo "000")
            WEB=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
            echo "API health: $HTTP"
            echo "Web health: $WEB"
            if [ "$HTTP" = "000" ]; then
              echo "FAIL: API not responding"
              pm2 logs agentcore-api --lines 20 --nostream 2>&1 || true
              exit 1
            fi
            echo ""
            echo "=== Deploy complete ==="
