name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api
      - name: Install Web dependencies
        run: npm ci
        working-directory: apps/web
      - name: npm audit (API)
        run: npm audit --audit-level=high
        working-directory: apps/api
        continue-on-error: true
      - name: npm audit (Web)
        run: npm audit --audit-level=high
        working-directory: apps/web
        continue-on-error: true

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web
      - name: Next.js Lint
        run: npm run lint
        working-directory: apps/web
        continue-on-error: true

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentcore
          POSTGRES_PASSWORD: agentcore
          POSTGRES_DB: agentcore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
        working-directory: apps/api
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
      - name: Run API Tests
        run: npm test
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://agentcore:agentcore@localhost:5432/agentcore_test
          JWT_SECRET: test-jwt-secret
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          PORT: 4000
          CLIENT_URL: http://localhost:3000
          API_URL: http://localhost:4000

  build:
    name: Build
    needs: [lint-and-typecheck, test-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web
      - name: Build Web
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.agentcore.work
          NEXT_PUBLIC_APP_URL: https://agentcore.work
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: apps/web/.next/
          retention-days: 7

  deploy:
    name: Deploy to Production
    needs: [security-audit, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            echo "--- Pulling latest code ---"
            cd /opt/agentcore-v3
            git pull origin main

            echo "--- Installing dependencies ---"
            cd /opt/agentcore-v3/apps/api
            npm ci --production

            echo "--- Generating Prisma client ---"
            npx prisma generate

            echo "--- Running database migrations ---"
            npx prisma migrate deploy

            echo "--- Building frontend ---"
            cd /opt/agentcore-v3/apps/web
            npm ci
            npm run build

            echo "--- Restarting services ---"
            export PATH=$PATH:$(npm root -g)/pm2/bin 2>/dev/null || true
            cd /opt/agentcore-v3
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js

            echo "--- Health checks ---"
            for i in $(seq 1 30); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/api/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "API health: $HTTP_CODE OK"
                break
              fi
              sleep 2
            done

            for i in $(seq 1 30); do
              WEB_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
              if [ "$WEB_CODE" = "200" ]; then
                echo "Web health: $WEB_CODE OK"
                break
              fi
              sleep 2
            done

            echo "--- Deploy complete ---"
            pm2 status
