version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: agentcore-test-db
    environment:
      POSTGRES_USER: agentcore_test
      POSTGRES_PASSWORD: test_password_123
      POSTGRES_DB: agentcore_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcore_test -d agentcore_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
