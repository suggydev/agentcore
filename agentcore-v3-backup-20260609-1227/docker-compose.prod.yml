version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentcore-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-agentcore}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentcore} -d ${POSTGRES_DB:-agentcore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: agentcore-api
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SUGGY_PROJECT_KEY: ${SUGGY_PROJECT_KEY}
      SUGGY_BASE_URL: ${SUGGY_BASE_URL:-https://api.suggy.lol/v1}
      SUGGY_ACCOUNT_ID: ${SUGGY_ACCOUNT_ID:-}
      MODEL_CACHE_TTL: ${MODEL_CACHE_TTL:-60000}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://agentcore.work}
      CLIENT_URL: ${CLIENT_URL:-https://agentcore.work}
      WEBCHAT_API_KEY: ${WEBCHAT_API_KEY:-}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_WEBHOOK_SECRET: ${YOOKASSA_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.agentcore.work}
    container_name: agentcore-web
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.agentcore.work}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
    driver: local
