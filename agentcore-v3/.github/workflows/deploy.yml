name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api

      - name: Install Web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Build Web
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.agentcore.work

      - name: Prepare deployment archive
        run: |
          mkdir -p deploy/api deploy/prisma deploy/web
          cp -r apps/api/* deploy/api/
          cp -r packages/prisma/schema.prisma deploy/prisma/
          cp apps/web/.next/standalone deploy/web/standalone -r 2>/dev/null || true
          cp apps/web/.next/static deploy/web/static -r 2>/dev/null || true
          cp apps/web/public deploy/web/public -r 2>/dev/null || true
          cp package.json deploy/ 2>/dev/null || true
          cd deploy && tar -czf ../agentcore-deploy.tar.gz .

      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: agentcore-deploy.tar.gz
          target: /opt/agentcore-v3/
          strip_components: 0

      - name: Run deploy commands
        uses: appleboy/ssh-action@v1.2.2
        timeout-minutes: 8
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd /opt/agentcore-v3

            echo "--- Backup database before migration ---"
            pg_dump -Fc agentcore > "/opt/backups/agentcore-pre-deploy-$(date +%Y%m%d-%H%M%S).dump" || echo "Backup skipped (pg_dump not available)"

            echo "--- Extracting archive ---"
            tar -xzf agentcore-deploy.tar.gz --overwrite
            rm -f agentcore-deploy.tar.gz

            echo "--- Installing API deps ---"
            cd /opt/agentcore-v3/deploy/api
            npm ci --production

            echo "--- Prisma migrate ---"
            cd /opt/agentcore-v3/deploy/api
            cp /opt/agentcore-v3/deploy/prisma/schema.prisma ./ 2>/dev/null || true
            npx prisma generate
            npx prisma migrate deploy

            echo "--- Rsync to live directory ---"
            rsync -av --delete /opt/agentcore-v3/deploy/api/ /opt/agentcore-v3/apps/api/
            rsync -av --delete /opt/agentcore-v3/deploy/web/ /opt/agentcore-v3/apps/web/
            rm -rf /opt/agentcore-v3/deploy

            echo "--- Restarting PM2 ---"
            export PATH=$PATH:$(npm root -g)/pm2/bin 2>/dev/null || true
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js

            echo "--- Health check ---"
            for i in {1..30}; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/api/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "API health: $HTTP_CODE OK"
                break
              fi
              sleep 2
            done
            if [ "$HTTP_CODE" != "200" ]; then
              echo "API health: $HTTP_CODE FAIL"
              exit 1
            fi

            for i in {1..30}; do
              WEB_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
              if [ "$WEB_CODE" = "200" ]; then
                echo "Web health: $WEB_CODE OK"
                break
              fi
              sleep 2
            done
            if [ "$WEB_CODE" != "200" ]; then
              echo "Web health: $WEB_CODE FAIL"
              exit 1
            fi

            pm2 status
            echo "--- Deploy complete ---"
