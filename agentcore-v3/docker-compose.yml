version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentcore-postgres
    environment:
      POSTGRES_USER: agentcore
      POSTGRES_PASSWORD: agentcore2026
      POSTGRES_DB: agentcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
