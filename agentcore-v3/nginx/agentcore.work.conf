limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

worker_connections 2048;
worker_rlimit_nofile 4096;

upstream nextjs_backend { server 127.0.0.1:3000; keepalive 32; }
upstream api_backend { server 127.0.0.1:4000; keepalive 64; }

proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect (certbot will add 443 blocks below)
server {
    listen 80;
    server_name agentcore.work www.agentcore.work api.agentcore.work;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name agentcore.work www.agentcore.work;

    root /opt/agentcore-v3/apps/web/public;

    gzip on;
    gzip_vary on;
    gzip_proxied auth expired no-cache no-store private must-revalidate;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/x-font-ttf
        application/font-woff
        application/font-woff2
        image/svg+xml;

    brotli on;
    brotli_comp_level 5;
    brotli_types text/plain text/css text/xml application/javascript application/json image/svg+xml;

    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # Security headers — inherited by child locations unless overridden
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.agentcore.work; font-src 'self' data:; frame-ancestors 'self';" always;

    # Static assets with cache — re-add security headers because add_header in location
    # blocks does NOT inherit from server block in nginx.
    location /_next/static/ {
        alias /opt/agentcore-v3/apps/web/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        add_header Vary Accept-Encoding always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    location /favicon.svg {
        expires 7d;
        add_header Cache-Control "public" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location / {
        limit_req zone=web_limit burst=50 nodelay;
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_hide_header X-Powered-By;
    }

    client_max_body_size 50m;
}

server {
    listen 443 ssl http2;
    server_name api.agentcore.work;

    gzip on;
    gzip_vary on;
    gzip_proxied auth expired no-cache no-store private must-revalidate;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.yookassa.ru; frame-ancestors 'none'; base-uri 'self';" always;

    location /api/v1/chat {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_buffering off;
        proxy_cache off;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_hide_header X-Powered-By;
    }

    location /api/v1/models {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_cache api_cache;
        proxy_cache_valid 200 60s;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_hide_header X-Powered-By;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_hide_header X-Powered-By;
    }

    client_max_body_size 50m;
}
